# Gitleaks complements GitHub-native secret scanning and push protection,
# which the provisioning script enables at repository level.
name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the latest released version from the GitHub API.
          GITLEAKS_VERSION=$(curl -sSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "Installing Gitleaks v${GITLEAKS_VERSION}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/
          rm -f gitleaks.tar.gz
          gitleaks version

      - name: Run Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect --source . \
            --config .gitleaks.toml \
            --redact \
            --report-format sarif \
            --report-path "${GITHUB_WORKSPACE}/gitleaks.sarif"

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-report
          path: gitleaks.sarif
          if-no-files-found: ignore
