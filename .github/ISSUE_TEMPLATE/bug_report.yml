name: Bug report
description: Report a reproducible defect in this repository.
title: "fix: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Provide enough detail for maintainers to reproduce and assess impact.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug and where it occurs.
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction steps
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Select the impact level.
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, runtime versions, relevant workflow run links, and commit SHA.
      placeholder: OS, Python version, tool versions, commit SHA
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Reporter checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets, tokens, and private data from this report.
          required: true
        - label: I can reproduce this issue on the latest main branch or generated repository baseline.
          required: false
