title: golden-repo
description: >-
  Secure GitHub template for creating agent and security-tooling repositories,
  with a baseline for infrastructure, source, docs, tools, and automated
  security and supply-chain workflows.

# Served as a GitHub Pages project site at https://josunefoorg.github.io/golden-repo/
url: "https://josunefoorg.github.io"
baseurl: "/golden-repo"

# just-the-docs theme, consumed remotely so no local Ruby toolchain is required.
remote_theme: just-the-docs/just-the-docs@v0.12.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Site behavior
color_scheme: dark
search_enabled: true
heading_anchors: true
nav_sort: case_insensitive

aux_links:
  golden-repo on GitHub:
    - "https://github.com/josunefoOrg/golden-repo"
aux_links_new_tab: true

# Footer
back_to_top: true
back_to_top_text: "Back to top"

# Exclude repository files that are not part of the published site.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
